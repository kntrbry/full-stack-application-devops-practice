name: CI - Build Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2 
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      # frontend image build

    - name: Run frontend tests
      env:
        CI: true
      run: |
        cd frontend
        npm ci
        npm test

    - name: Docker Meta (frontend)
      id: meta-frontend
      uses: docker/metadata-action@v4
      with:
        images: |
          tsnepca/fullstack-app-frontend
        tags: |
          type=raw,value=latest
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value={{date 'YYYYMMDD'}}-{{sha}}

    - name: Build and push the frontend image 
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        cache-from: type=registry,ref=tsnepca/fullstack-app-frontend:cache
        cache-to: type=registry,ref=tsnepca/fullstack-app-frontend:cache,mode=max

    - name: Scan frontend image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: tsnepca/fullstack-app-frontend:latest
        format: 'table'
        exit-code: '0'  # Fail the action if vulnerabilities are found
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH,MEDIUM' 

      # backend image build

    - name: Spin up database
      run: |
        docker run -d --name db -p 27017:27017 -v vidly:/data/db mongo:4.0-xenial

    - name: Run backend tests
      env:
        CI: true
      run: |
        cd backend
        npm ci
        npm run test

    
    - name: Docker Meta (backend)
      id: meta-backend
      uses: docker/metadata-action@v4
      with:
        images: |
          tsnepca/fullstack-app-backend
        tags: |
          type=raw,value=latest
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value={{date 'YYYYMMDD'}}-{{sha}}
          
    - name: Build and push the backend image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        cache-from: type=registry,ref=tsnepca/fullstack-app-backend:cache
        cache-to: type=registry,ref=tsnepca/fullstack-app-backend:cache,mode=max

    - name: Scan backend image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: tsnepca/fullstack-app-backend:latest
        format: 'table'
        exit-code: '0'  # Fail the action if vulnerabilities are found
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH,MEDIUM' 
      continue-on-error: true 

      # nginx image build

    - name: Docker Meta (nginx)
      id: meta-nginx
      uses: docker/metadata-action@v4
      with:
        images: |
          tsnepca/fullstack-app-nginx
        tags: |
          type=raw,value=latest
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value={{date 'YYYYMMDD'}}-{{sha}}

    - name: Build and push the nginx image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile-nginx
        push: true
        tags: ${{ steps.meta-nginx.outputs.tags }}
        cache-from: type=registry,ref=tsnepca/fullstack-app-frontend:cache
        cache-to: type=registry,ref=tsnepca/fullstack-app-frontend:cache,mode=max

    - name: Scan nginx image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: tsnepca/fullstack-app-nginx:latest
        format: 'table'
        exit-code: '0'  # Fail the action if vulnerabilities are found
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH,MEDIUM'      

    